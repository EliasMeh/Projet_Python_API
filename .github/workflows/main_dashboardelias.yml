name: Build and deploy Python app to Azure Web App - dashboardelias Test off

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - 'requirements.txt'
      - '.github/workflows/main_dashboardelias.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: "dashboardelias"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare deployment package
        run: |
          mkdir -p package
          cp requirements.txt package/
          cp dashboard/app.py package/

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-app
          path: package

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dashboard-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C890E0AF0D704FFCBE080F9175D5A666 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FE5380142E724D598B1CADE35C502A74 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9987182091C446C2AFF5CCB3F25A1E7D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: .