name: CI/CD AKS

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  K8S_NAMESPACE: default
  API_IMAGE_NAME: devops-monitor-api
  DASHBOARD_IMAGE_NAME: devops-monitor-dashboard
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint
        continue-on-error: true
        run: make lint

      - name: Run tests
        continue-on-error: true
        run: make test

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR login server
        id: acr
        run: |
          echo "login_server=$(az acr show --name ${{ secrets.ACR_NAME }} --query loginServer -o tsv)" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build API image
        run: |
          docker build -f api/Dockerfile \
            -t ${{ steps.acr.outputs.login_server }}/${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Push API image
        run: |
          docker push ${{ steps.acr.outputs.login_server }}/${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Build Dashboard image
        run: |
          docker build -f dashboard/Dockerfile \
            -t ${{ steps.acr.outputs.login_server }}/${{ env.DASHBOARD_IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Push Dashboard image
        run: |
          docker push ${{ steps.acr.outputs.login_server }}/${{ env.DASHBOARD_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get ACR login server
        id: acr
        run: |
          echo "login_server=$(az acr show --name ${{ secrets.ACR_NAME }} --query loginServer -o tsv)" >> $GITHUB_OUTPUT

      - name: Replace image tags in manifests
        run: |
          sed -i "s|__API_IMAGE__|${{ steps.acr.outputs.login_server }}/${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" k8s/api-deployment.yaml
          sed -i "s|__DASHBOARD_IMAGE__|${{ steps.acr.outputs.login_server }}/${{ env.DASHBOARD_IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" k8s/dashboard-deployment.yaml

      - name: Deploy manifests to AKS
        uses: Azure/k8s-deploy@v5
        with:
          namespace: ${{ env.K8S_NAMESPACE }}
          manifests: |
            k8s/api-deployment.yaml
            k8s/api-service.yaml
            k8s/dashboard-deployment.yaml
            k8s/dashboard-service.yaml