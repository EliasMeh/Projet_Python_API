name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint
        run: python -m flake8 api/ dashboard/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v --cov=api --cov-fail-under=75

  build-images:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f api/Dockerfile -t devops-monitor-api:ci .

      - name: Build dashboard image
        run: docker build -f dashboard/Dockerfile -t devops-monitor-dashboard:ci .

# Azure deployment will be added later once the target subscription,
# resource group, hosting service, registry, and environment names are known.
