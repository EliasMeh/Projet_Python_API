name: Build and deploy Python app to Azure Web App - projetapielias

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  APP_NAME: "projetapielias"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Prepare deployment package
        run: |
          mkdir -p package
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude 'venv' \
            --exclude 'antenv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude '.mypy_cache' \
            --exclude '.env' \
            --exclude 'tests' \
            ./ package/

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: package

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    environment:
      name: Production
      url: https://${{ env.APP_NAME }}.azurewebsites.net

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8018D34226444419B2B091B981A8C2D0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_159CA739B5F14F5D9E2A16E6EC9EB530 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6A1BD4FB0827435F9252D29B9B256961 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          slot-name: Production
          package: .